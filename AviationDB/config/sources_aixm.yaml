# AIXM Data Sources Inventory for European Countries
# Based on EUROCONTROL AIXM Data Sources Inventory and national AIS portals
# Last updated: 2026-07-19

sources:
  germany:
    country: DE
    icao: ED
    ansp: DFS
    aixm_version: "5.1.1"
    url: "https://aip.dfs.de/datasets"
    data_sets:
      - designated_points
      - navaids
      - routes
    auth_required: false
    license: "Copyright DFS - aviation use only"
    status: available
    notes: >
      AIXM 5.1.1 format with BASELINE TimeSlices.
      Accessible via NOW/NEXT/AFTER menu. Also offers Excel format.
      REST API available. Automated download explicitly permitted.

  spain:
    country: ES
    icao: LE
    ansp: ENAIRE
    aixm_version: "5.1"
    url: "https://aip.enaire.es/AIP/"
    data_sets:
      - designated_points
      - navaids
      - routes
    auth_required: false
    license: "CC BY-NC 4.0 (OpenAIP compatible)"
    status: available
    notes: >
      AIXM 5.1 data sets downloadable by amendment.
      Also offers CSV format resembling AIP section tables.

  france:
    country: FR
    icao: LF
    ansp: DSNA/SIA
    aixm_version: "5.1"
    url: "https://www.sia.aviation-civile.gouv.fr/"
    data_sets:
      - designated_points
      - navaids
    auth_required: false
    license: "Evaluation/demo only - not certified"
    status: experimental
    notes: >
      Sample AIXM 5.1 data set from experimental converter.
      Not suitable for operational use. AIXM 4.5 available via NOPIA.

  netherlands_dc:
    country: DC (Dutch Caribbean)
    icao: TN
    ansp: DC-ANSP
    aixm_version: "5.1"
    url: "https://dc-ansp.org/eAIS/aerodb/"
    data_sets:
      - aip_dataset
    auth_required: false
    license: "Public"
    status: available
    notes: >
      Full AIP data set per AIRAC cycle.
      Direct XML download with SHA-256 checksum.

  belgium:
    country: BE
    icao: EB
    ansp: skeyes
    aixm_version: "4.5 (SDO)"
    url: "https://www.skeyes.be/"
    data_sets:
      - sdo_aixm45
    auth_required: true
    license: "EAD User Agreement required"
    status: ead_only
    notes: >
      Data maintained in EAD SDO (AIXM 4.5) via iNM.
      Not publicly downloadable. Requires EAD Pro/MyEAD access.

  netherlands:
