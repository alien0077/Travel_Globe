name: iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'project.yml'
      - 'TravelGlobe.xcodeproj/**'
      - 'scripts/copy-replay-to-ios.sh'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: replay-engine/package-lock.json
      - run: npm --prefix replay-engine ci
      - run: npm --prefix replay-engine run build
      - run: scripts/copy-replay-to-ios.sh
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: xcodebuild build -quiet -scheme TravelGlobe -destination 'generic/platform=iOS Simulator' -derivedDataPath /tmp/TravelGlobeDerived CODE_SIGNING_ALLOWED=NO
      - name: Create iOS simulator if needed
        id: ios-simulator
        run: |
          set -euo pipefail
          existing_udid="$(xcrun simctl list devices available | awk -F '[()]' '/Travel Globe CI/ {print $2; exit}' || true)"
          if [ -n "$existing_udid" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "udid=${existing_udid}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          runtime="$(xcrun simctl list runtimes available | awk -F '[()]' '/iOS/ {print $2}' | tail -n 1 || true)"
          device_type="$(xcrun simctl list devicetypes | awk -F '[()]' '/iPhone 16 Pro/ {print $2; exit} /iPhone 15/ {candidate=$2} END {if (candidate) print candidate}' || true)"
          if [ -z "$runtime" ] || [ -z "$device_type" ]; then
            echo "Unable to resolve an available iOS runtime/device type"
            xcrun simctl list runtimes available
            xcrun simctl list devicetypes
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! created_udid="$(xcrun simctl create 'Travel Globe CI' "$device_type" "$runtime")"; then
            echo "Unable to create Travel Globe CI simulator; skipping simulator tests"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "udid=${created_udid}" >> "$GITHUB_OUTPUT"
      - name: Resolve iOS simulator destination
        if: steps.ios-simulator.outputs.available == 'true'
        id: ios-destination
        run: |
          set -euo pipefail
          xcrun simctl boot '${{ steps.ios-simulator.outputs.udid }}' || true
          xcrun simctl bootstatus '${{ steps.ios-simulator.outputs.udid }}' -b
          xcodebuild -showdestinations -scheme TravelGlobe > /tmp/travelglobe-destinations.txt
          cat /tmp/travelglobe-destinations.txt
          destination="$(python3 - '${{ steps.ios-simulator.outputs.udid }}' <<'PY'
          import re
          import sys

          udid = sys.argv[1]

          with open('/tmp/travelglobe-destinations.txt', encoding='utf-8') as handle:
              text = handle.read()

          for line in text.splitlines():
              if 'platform:iOS Simulator' not in line or 'name:Travel Globe CI' not in line:
                  continue
              match = re.search(r'id:([^,}]+)', line)
              if match:
                  print(f'id={match.group(1).strip()}')
                  break
          else:
              print(f'platform=iOS Simulator,id={udid}')
          PY
          )"
          if [ -z "$destination" ]; then
            echo "Unable to resolve simulator destination"
            exit 1
          fi
          echo "destination=${destination}" >> "$GITHUB_OUTPUT"
      - if: steps.ios-simulator.outputs.available == 'true'
        run: xcodebuild test -quiet -scheme TravelGlobe -destination '${{ steps.ios-destination.outputs.destination }}' -derivedDataPath /tmp/TravelGlobeDerived CODE_SIGNING_ALLOWED=NO
