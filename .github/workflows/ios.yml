name: iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'project.yml'
      - 'TravelGlobe.xcodeproj/**'
      - 'scripts/copy-replay-to-ios.sh'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: replay-engine/package-lock.json
      - run: npm --prefix replay-engine ci
      - run: npm --prefix replay-engine run build
      - run: scripts/copy-replay-to-ios.sh
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: xcodebuild build -quiet -scheme TravelGlobe -destination 'generic/platform=iOS Simulator' -derivedDataPath /tmp/TravelGlobeDerived CODE_SIGNING_ALLOWED=NO
      - name: Resolve iOS simulator destination
        id: ios-destination
        run: |
          set -euo pipefail
          xcodebuild -showdestinations -scheme TravelGlobe > /tmp/travelglobe-destinations.txt
          cat /tmp/travelglobe-destinations.txt
          destination="$(python3 - <<'PY'
          import re

          with open('/tmp/travelglobe-destinations.txt', encoding='utf-8') as handle:
              text = handle.read()

          for line in text.splitlines():
              if 'platform:iOS Simulator' not in line or 'name:iPhone' not in line:
                  continue
              match = re.search(r'id:([^,}]+)', line)
              if match:
                  print(f'id={match.group(1).strip()}')
                  break
          else:
              raise SystemExit('No available iPhone simulator destination found')
          PY
          )"
          echo "destination=${destination}" >> "$GITHUB_OUTPUT"
      - run: xcodebuild test -quiet -scheme TravelGlobe -destination '${{ steps.ios-destination.outputs.destination }}' -derivedDataPath /tmp/TravelGlobeDerived CODE_SIGNING_ALLOWED=NO
