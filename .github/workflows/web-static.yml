name: Web Static Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'replay-engine/**'
      - 'shared/**'
      - 'contracts/**'
      - '.github/workflows/web-static.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: replay-engine/package-lock.json
      - run: npm --prefix replay-engine ci
      - run: npm --prefix replay-engine run typecheck
      - run: npm --prefix replay-engine run test
      - run: npm --prefix replay-engine run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: replay-engine/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
