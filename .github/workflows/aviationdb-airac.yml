name: AviationDB AIRAC Pack Check

on:
  workflow_dispatch:
  schedule:
    - cron: '42 4 * * 4'

permissions:
  contents: read

jobs:
  fixture-pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -e "AviationDB[dev]"
      - run: scripts/prepare-aviation-data.sh
      - name: Ensure generated public pack is reviewed
        run: |
          if git diff --quiet -- shared/offline-packs/aviation replay-engine/public/offline-packs/aviation AviationDB/data/reports; then
            echo "AviationDB fixture/public pack is unchanged."
          else
            echo "::warning::AviationDB generated pack changed. Review license status before publishing."
            git diff --stat -- shared/offline-packs/aviation replay-engine/public/offline-packs/aviation AviationDB/data/reports
            git diff --exit-code -- shared/offline-packs/aviation replay-engine/public/offline-packs/aviation AviationDB/data/reports
          fi
