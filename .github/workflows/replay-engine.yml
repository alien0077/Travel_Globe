name: Replay Engine

on:
  push:
    paths:
      - 'replay-engine/**'
      - 'shared/**'
      - 'contracts/**'
      - '.github/workflows/replay-engine.yml'
  pull_request:
    paths:
      - 'replay-engine/**'
      - 'shared/**'
      - 'contracts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: replay-engine/package-lock.json
      - run: npm --prefix replay-engine ci
      - run: npm --prefix replay-engine run typecheck
      - run: npm --prefix replay-engine run test
      - run: npm --prefix replay-engine run build
