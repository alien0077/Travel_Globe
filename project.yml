name: TravelGlobe
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: app.travelglobe.TravelGlobe
    SWIFT_VERSION: 5.9
targets:
  TravelGlobe:
    type: application
    platform: iOS
    sources:
      - path: ios/TravelGlobe
        excludes:
          - Tests
    resources:
      - path: ios/TravelGlobe/Resources
        optional: true
    settings:
      base:
        INFOPLIST_FILE: ios/TravelGlobe/Resources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: false
    entitlements:
      path: ios/TravelGlobe/Resources/TravelGlobe.entitlements
    scheme:
      testTargets:
        - TravelGlobeTests
  TravelGlobeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ios/TravelGlobe/Tests
    dependencies:
      - target: TravelGlobe
