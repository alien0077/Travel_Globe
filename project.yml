name: TravelGlobe
options:
  minimumXcodeGenVersion: 2.38.0
  bundleIdPrefix: com.alienchang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  TravelGlobe:
    type: application
    platform: iOS
    sources:
      - path: ios/TravelGlobe
        excludes:
          - Tests
    resources:
      - path: ios/TravelGlobe/Resources/ReplayEngine
        type: folder
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alienchang.TravelGlobe
        DEVELOPMENT_TEAM: "3K99Q8NGDT"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ios/TravelGlobe/Resources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: false
    entitlements:
      path: ios/TravelGlobe/Resources/TravelGlobe.entitlements
    scheme:
      testTargets:
        - TravelGlobeTests
  TravelGlobeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ios/TravelGlobe/Tests
    dependencies:
      - target: TravelGlobe
    settings:
      base:
        DEVELOPMENT_TEAM: "3K99Q8NGDT"
        CODE_SIGN_STYLE: Automatic
